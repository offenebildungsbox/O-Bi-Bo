<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offene Bildungsbox - Die Box</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="style.css">

    <style>
    .nav-link_box {
            background-color: #f3cbe1;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="box.html" class="nav-empty">
        <img src="static/logo.png" alt="Startseite" class="logo-img">
        </a>
        
         <div class="nav-links" id="nav-links">
            <a href="box.html" class="nav-link_box">Das Konzept</a>
            <a href="material.html" class="nav-link_mat">Die Materialien</a>
            <a href="workshops.html" class="nav-link_wosh">Die Workshops</a>
            <a href="projekt.html" class="nav-link_proj">Über das Projekt</a>
        </div>

        <div class="burger-menu" id="burger-menu">
            <div class="line line1"></div>
            <div class="line line2"></div>
            <div class="line line3"></div>
        </div>
    </nav>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
        </aside>

        <main class="content-area" id="markdown-content">
            Lade Inhalte...
        </main>
    </div>

    <script>
        // --- 1. Burger Menü Logik ---
        const burgerMenu = document.getElementById('burger-menu');
        const navLinks = document.getElementById('nav-links');

        burgerMenu.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // --- 2. Markdown Datei laden und rendern ---
        // WICHTIG: Ersetze 'ordnername/box.md' mit dem tatsächlichen Pfad zu deiner Markdown-Datei
        const markdownFilePath = 'box.md'; 

        fetch(markdownFilePath)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Fehler beim Laden der Markdown-Datei');
                }
                return response.text();
            })
            .then(text => {
                // Wandelt das Markdown in HTML um und fügt es in den <main> Container ein
                document.getElementById('markdown-content').innerHTML = marked.parse(text);
            })
            .catch(error => {
                document.getElementById('markdown-content').innerHTML = '<p>Die Inhalte konnten leider nicht geladen werden.</p>';
                console.error(error);
            });
    </script>
</body>
</html>
