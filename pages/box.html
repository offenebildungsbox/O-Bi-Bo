<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offene Bildungsbox - Die Box</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Grundlegendes Styling (Identisch zur Startseite) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Menüleiste --- */
        .top-nav {
            display: flex;
            border-bottom: 4px solid black;
            background-color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            align-items: center;
            height: 60px; 
        }

        .nav-empty {
            width: 60px; 
            height: 100%;
            border-right: 4px solid black;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            flex: 1;
            height: 100%;
        }

        .nav-link, .nav-link2, .nav-link3, .nav-link4, .nav-link5 {
            flex: 1;
            display: flex;
            align-items: center;     
            justify-content: center; 
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-size: 1.2rem;
            border-right: 4px solid black;
            transition: background-color 0.3s, color 0.3s;
            min-width: 120px;
            height: 100%; 
        }

        .nav-links a:last-child { border-right: none; }
        .nav-link:hover { background-color: #f3cbe1; color: #000; }
        .nav-link2:hover { background-color: #3aaf71; color: #000; }
        .nav-link3:hover { background-color: #6b85c3; color: #000; }
        .nav-link4:hover { background-color: #edce76; color: #000; }
        .nav-link5:hover { background-color: #278807; color: #000; }

        /* --- Burger Menü Icon --- */
        .burger-menu {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 35px;
            height: 25px;
            cursor: pointer;
            margin: 0 20px;
            margin-left: auto;
        }

        .burger-menu .line {
            width: 100%;
            height: 5px;
            border-radius: 3px;
            border: 1px solid black;
        }

        .burger-menu .line1 { background-color: #f3cbe1; } 
        .burger-menu .line2 { background-color: #3aaf71; } 
        .burger-menu .line3 { background-color: #6b85c3; } 

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%; 
                left: 0;
                width: 100%;
                background-color: white;
                border-bottom: 4px solid black;
                height: auto; 
            }
            .nav-links.active { display: flex; }
            .nav-link, .nav-link2, .nav-link3, .nav-link4, .nav-link5 {
                border-right: none;
                border-bottom: 2px solid black;
                width: 100%;
                height: 55px; 
            }
            .nav-links a:last-child { border-bottom: none; }
            .burger-menu { display: flex; }
        }
        
        /* --- Hauptbereich --- */
        .main-container {
            display: flex;
            flex: 1;
        }

        .sidebar {
            width: 60px; 
            border-right: 4px solid black;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-box {
            height: 150px;
            border-bottom: 4px solid black;
        }

        /* --- NEU: Content Bereich für den Markdown-Text --- */
        .content-area {
            flex: 1;
            padding: 40px;
            max-width: 900px; /* Begrenzt die Textbreite, damit man besser lesen kann */
            line-height: 1.6;
        }

        /* Styling für die Markdown-Elemente */
        .content-area h1 { margin-bottom: 20px; font-size: 2.5rem; }
        .content-area h2 { margin-top: 30px; margin-bottom: 15px; }
        .content-area p { margin-bottom: 20px; font-size: 1.1rem; }
        .content-area ul, .content-area ol { margin-bottom: 20px; padding-left: 30px; font-size: 1.1rem;}
        .content-area li { margin-bottom: 10px; }
        
        /* Sorgt dafür, dass Bilder aus dem Markdown nicht zu groß werden */
        .content-area img {
            max-width: 100%;
            height: auto;
            border: 4px solid black; /* Passt optisch zum Rest der Seite */
            margin-bottom: 20px;
        }

    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-empty"></div>
        
        <div class="nav-links" id="nav-links">
            <a href="box.html" class="nav-link">Die Box</a>
            <a href="wissen.html" class="nav-link2">Wissen</a>
            <a href="material.html" class="nav-link3">Material</a>
            <a href="workshops.html" class="nav-link4">Workshops</a>
            <a href="partner.html" class="nav-link2">Partner</a>
        </div>

        <div class="burger-menu" id="burger-menu">
            <div class="line line1"></div>
            <div class="line line2"></div>
            <div class="line line3"></div>
        </div>
    </nav>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
        </aside>

        <main class="content-area" id="markdown-content">
            Lade Inhalte...
        </main>
    </div>

    <script>
        // --- 1. Burger Menü Logik ---
        const burgerMenu = document.getElementById('burger-menu');
        const navLinks = document.getElementById('nav-links');

        burgerMenu.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // --- 2. Markdown Datei laden und rendern ---
        // WICHTIG: Ersetze 'ordnername/box.md' mit dem tatsächlichen Pfad zu deiner Markdown-Datei
        const markdownFilePath = 'box.md'; 

        fetch(markdownFilePath)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Fehler beim Laden der Markdown-Datei');
                }
                return response.text();
            })
            .then(text => {
                // Wandelt das Markdown in HTML um und fügt es in den <main> Container ein
                document.getElementById('markdown-content').innerHTML = marked.parse(text);
            })
            .catch(error => {
                document.getElementById('markdown-content').innerHTML = '<p>Die Inhalte konnten leider nicht geladen werden.</p>';
                console.error(error);
            });
    </script>
</body>
</html>
