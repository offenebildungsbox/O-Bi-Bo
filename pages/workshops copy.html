<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offene Bildungsbox</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- Farbliche Markiering Menü ---*/
        .nav-link_wosh {background-color: #6b85c3;}

        /* --- Hauptbereich --- */
        .main-container {
            display: flex;
            flex: 1;
        }

        .sidebar {
            width: 60px; /* Feste Breite: Identisch mit der Höhe des Headers */
            border-right: 4px solid black;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-box {
            height: 150px;
            border-bottom: 4px solid black;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 40px;
            flex: 1;
            align-content: start;
        }

        .grid-item {
            display: block;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s;
        }

        .grid-item:hover {
            transform: scale(1.02);
        }

        /* --- Die exakte Projektbox --- */
        .project-box {
            display: grid;
            grid-template-columns: 40fr 3fr;
            grid-template-rows: 30fr 3fr;
            aspect-ratio: 43 / 33; 
            border: 4px solid black; 
            background-color: white;
        }

        .inner-content {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
            background-color: #d9d9d9;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            overflow: hidden;
        }

        .inner-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: top left;
        }

        .border-right {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
            border-left: 4px solid black; 
            display: flex;
            flex-direction: column; 
        }

        .border-right-box {
            flex: 1; 
        }

        .border-right-box:not(:last-child) {
            border-bottom: 4px solid black;
        }

        .border-bottom {
            grid-column: 1 / 2;
            grid-row: 2 / 3;
            border-top: 4px solid black; 
            display: flex; 
        }

        .border-bottom-box {
            flex: 1; 
        }

        .border-bottom-box:not(:last-child) {
            border-right: 4px solid black;
        }

        .border-corner {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
            background-color: white;
            border-left: 4px solid black;
            border-top: 4px solid black;
        }

    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="box.html" class="nav-empty">
        <img src="static/logo.png" alt="Startseite" class="logo-img">
        </a>
        
         <div class="nav-links" id="nav-links">
            <a href="box.html" class="nav-link_box">Das Konzept</a>
            <a href="material.html" class="nav-link_mat">Die Materialien</a>
            <a href="workshops.html" class="nav-link_wosh">Die Workshops</a>
            <a href="projekt.html" class="nav-link_proj">Über das Projekt</a>
        </div>

        <div class="burger-menu" id="burger-menu">
            <div class="line line1"></div>
            <div class="line line2"></div>
            <div class="line line3"></div>
        </div>
    </nav>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
        </aside>

        <main class="content-grid">
            
            <a href="retro_1.html" class="grid-item">
                <div class="project-box">
                    <div class="inner-content">
                        <img src="RetroPi.jpg" alt="RetroPie">
                    </div>
                    <div class="border-right">
                        <div class="border-right-box"></div>
                        <div class="border-right-box"></div>
                        <div class="border-right-box"></div>
                        <div class="border-right-box"></div>
                        <div class="border-right-box"></div>
                    </div>
                    <div class="border-bottom">
                        <div class="border-bottom-box"></div>
                        <div class="border-bottom-box"></div>
                        <div class="border-bottom-box"></div>
                        <div class="border-bottom-box"></div>
                        <div class="border-bottom-box"></div>
                    </div>
                    <div class="border-corner"></div>
                </div>
            </a>

            <a href="retro_2.html" class="grid-item">
                <div class="project-box">
                    <div class="inner-content">
                        <img src="RetroPi.jpg" alt="RetroPie">
                    </div>
                    <div class="border-right">
                        <div class="border-right-box"></div>

                        <div class="border-right-box"></div>
                        <div class="border-right-box"></div>
                        <div class="border-right-box"></div>
                    </div>
                    <div class="border-bottom">
                        <div class="border-bottom-box"></div>
                        <div class="border-bottom-box"></div>
                        <div class="border-bottom-box"></div>
                        <div class="border-bottom-box"></div>
                        <div class="border-bottom-box"></div>
                    </div>

            <a href="retro_2.html" class="grid-item">
                <div class="project-box">
                    <div class="inner-content">
                        <img src="RetroPi.jpg" alt="RetroPie">
                    </div>
                    <div class="border-right">
                        <div class="border-right-box"></div>
                        <div class="border-right-box"></div>
                        <div class="border-right-box"></div>
                        <div class="border-right-box"></div>
                        <div class="border-right-box"></div>
                    </div>
                    <div class="border-bottom">

                    </div>

                </div>
            </a>
            
        </main>
    </div>

    <script>
        const burgerMenu = document.getElementById('burger-menu');
        const navLinks = document.getElementById('nav-links');

        burgerMenu.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
