<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offene Bildungsbox - Workshops</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Farbliche Markierung Menü */
        .nav-link_wosh { background-color: #6b85c3; }

        /* --- Layout --- */
        .main-container { display: flex; flex: 1; }
        .sidebar { width: 60px; border-right: 4px solid black; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-box { height: 150px; border-bottom: 4px solid black; }
        
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 40px;
            flex: 1;
            align-content: start;
        }

        .grid-item { display: block; text-decoration: none; color: inherit; transition: transform 0.2s; }
        .grid-item:hover { transform: scale(1.02); }

        /* Projektbox Styling */
        .project-box { display: grid; grid-template-columns: 40fr 3fr; grid-template-rows: 30fr 3fr; aspect-ratio: 43 / 33; border: 4px solid black; background-color: white; }
        .inner-content { grid-column: 1 / 2; grid-row: 1 / 2; background-color: #d9d9d9; display: flex; justify-content: flex-start; align-items: flex-start; overflow: hidden; }
        .inner-content img { width: 100%; height: 100%; object-fit: contain; object-position: top left; }
        .border-right { grid-column: 2 / 3; grid-row: 1 / 2; border-left: 4px solid black; display: flex; flex-direction: column; }
        .border-right-box { flex: 1; }
        .border-right-box:not(:last-child) { border-bottom: 4px solid black; }
        .border-bottom { grid-column: 1 / 2; grid-row: 2 / 3; border-top: 4px solid black; display: flex; }
        .border-bottom-box { flex: 1; }
        .border-bottom-box:not(:last-child) { border-right: 4px solid black; }
        .border-corner { grid-column: 2 / 3; grid-row: 2 / 3; background-color: white; border-left: 4px solid black; border-top: 4px solid black; }
    </style>
</head>
<body>

    <div id="menu-container"></div>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
        </aside>

        <main class="content-grid" id="workshop-grid">
            Lade Inhalte...
        </main>
    </div>

    <script>
    // --- 1. Lade das Menü ---
        fetch('menu.html')
            .then(response => response.text())
            .then(data => {
                // Füge das Menü in den Container ein
                document.getElementById('menu-container').innerHTML = data;

                // 2. Aktiviere das Burger-Menü (erst JETZT, wo das Menü existiert)
                const burgerMenu = document.getElementById('burger-menu');
                const navLinks = document.getElementById('nav-links');

                if (burgerMenu && navLinks) {
                    burgerMenu.addEventListener('click', () => {
                        navLinks.classList.toggle('active');
                    });
                }
            })
            .catch(error => console.error('Fehler beim Laden des Menüs:', error));

        // 2. Workshops dynamisch laden
        fetch('workshops/workshops.json')
            .then(response => response.json())
            .then(workshops => {
                const grid = document.getElementById('workshop-grid');
                grid.innerHTML = ''; // Lade-Text entfernen

                workshops.forEach(ws => {
                    // Generiert den Pfad zum Bild (z.B. Workshops/Arcade_Automat/image.jpg)
                    const imagePath = `Workshops/${ws.ordner}/${ws.bild}`;
                    // Verlinkt auf die Template-Seite und übergibt den Ordnernamen in der URL
                    const linkUrl = `workshop-template.html?id=${ws.ordner}`;

                    const boxHTML = `
                        <a href="${linkUrl}" class="grid-item">
                            <div class="project-box">
                                <div class="inner-content">
                                    <img src="${imagePath}" alt="${ws.titel}">
                                </div>
                                <div class="border-right">
                                    <div class="border-right-box"></div><div class="border-right-box"></div><div class="border-right-box"></div><div class="border-right-box"></div><div class="border-right-box"></div>
                                </div>
                                <div class="border-bottom">
                                    <div class="border-bottom-box"></div><div class="border-bottom-box"></div><div class="border-bottom-box"></div><div class="border-bottom-box"></div><div class="border-bottom-box"></div>
                                </div>
                                <div class="border-corner"></div>
                            </div>
                        </a>
                    `;
                    grid.innerHTML += boxHTML;
                });
            })
            .catch(error => {
                document.getElementById('workshop-grid').innerHTML = '<p>Workshops konnten nicht geladen werden.</p>';
                console.error(error);
            });
    </script>
</body>
</html>
