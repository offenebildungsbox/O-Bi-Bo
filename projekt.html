<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offene Bildungsbox - Die Box</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="style.css">
    <style>
    .nav-link_proj {
            background-color: #edce76;
        }
    </style>
</head>
<body>

    <div id="menu-container"></div>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
            <div class="sidebar-box"></div>
        </aside>

        <main class="content-area" id="markdown-content">
            Lade Inhalte...
        </main>
    </div>


    <script>
        // --- 1. Lade das Menü ---
        fetch('menu.html')
            .then(response => response.text())
            .then(data => {
                // Füge das Menü in den Container ein
                document.getElementById('menu-container').innerHTML = data;

                // 2. Aktiviere das Burger-Menü (erst JETZT, wo das Menü existiert)
                const burgerMenu = document.getElementById('burger-menu');
                const navLinks = document.getElementById('nav-links');

                if (burgerMenu && navLinks) {
                    burgerMenu.addEventListener('click', () => {
                        navLinks.classList.toggle('active');
                    });
                }
            })
            .catch(error => console.error('Fehler beim Laden des Menüs:', error));

        // --- 2. Markdown Datei laden und rendern ---
        const markdownFilePath = 'static_content/project.md'; 

        fetch(markdownFilePath)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Fehler beim Laden der Markdown-Datei');
                }
                return response.text();
            })
            .then(text => {
                // Wandelt das Markdown in HTML um und fügt es in den <main> Container ein
                document.getElementById('markdown-content').innerHTML = marked.parse(text);
            })
            .catch(error => {
                document.getElementById('markdown-content').innerHTML = '<p>Die Inhalte konnten leider nicht geladen werden.</p>';
                console.error(error);
            });
    </script>
</body>
</html>
